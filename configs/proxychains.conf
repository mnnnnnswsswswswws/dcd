# iKali proxychains-ng configuration — routes connections through local Tor.
# Copy to ~/.proxychains/proxychains.conf (done automatically by 14_utils.sh).
#
# Usage:  proxychains4 nmap -sT -Pn <target>
#         proxychains4 curl https://check.torproject.org/

# strict_chain: connect through every proxy in the list, in order, all must work.
strict_chain

# Resolve DNS through the proxy to avoid DNS leaks.
proxy_dns

# Timeouts (milliseconds).
tcp_read_time_out 15000
tcp_connect_time_out 8000

# Quiet startup banner.
quiet_mode

[ProxyList]
# Local Tor SOCKS5 listener (started by `tor`; see configs/torrc).
socks5 127.0.0.1 9050

# To chain through a local intercepting proxy (e.g. mitmproxy on 8080),
# uncomment the next line and switch the chain type to dynamic_chain above.
# http 127.0.0.1 8080
