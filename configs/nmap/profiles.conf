# iKali nmap scan profiles — reference command lines.
# On iSH add:  -sT --unprivileged   (no raw sockets). Elsewhere -sS works as root.

# quick      : fast top-1000 TCP with default scripts and version detection
#   nmap -Pn -sV -sC --top-ports 1000 -T4 <target>

# standard   : top-3000 ports, version + default scripts
#   nmap -Pn -sV -sC --top-ports 3000 -T4 <target>

# full       : every TCP port, aggressive detection
#   nmap -Pn -p- -sV -sC -A -T4 <target>

# stealth    : slow SYN scan, fragmented (native/UTM with root only)
#   nmap -Pn -sS -T2 -f --data-length 25 <target>

# udp-top    : common UDP services
#   nmap -Pn -sU --top-ports 100 <target>

# discovery  : ping sweep of a range (iSH: -PS22,80,443 instead of ICMP)
#   nmap -sn 192.168.1.0/24

# vuln       : run the vulnerability NSE category
#   nmap -Pn -sV --script vuln <target>
